<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NODE_008 // FRAGMENT_RECOVERY</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
body {
    background-color: #000;
    color: #0f0;
    font-family: 'Share Tech Mono', monospace;
    margin: 0;
    overflow: hidden;
    display: flex;
    height: 100vh;
}
.crt {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    background-size: 100% 4px, 3px 100%;
    z-index: 100;
    pointer-events: none;
    opacity: 0.8;
}
#stream-left, #stream-right {
    width: 20vw;
    height: 100vh;
    overflow: hidden;
    font-size: 0.7rem;
    color: #040;
    word-break: break-all;
    line-height: 1;
    opacity: 0.5;
}
#center-console {
    width: 60vw;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 10;
    position: relative;
}
.glitch-text {
    font-size: 1.5rem;
    color: #fff;
    text-shadow: 2px 0 red, -2px 0 blue;
    animation: glitch-anim 0.2s infinite;
    margin-bottom: 20px;
}
@keyframes glitch-anim {
    0% { transform: translate(0) skew(0deg); }
    20% { transform: translate(-2px, 2px) skew(-5deg); }
    40% { transform: translate(2px, -2px) skew(5deg); }
    60% { transform: translate(-2px, 0) skew(0deg); }
    80% { transform: translate(2px, 2px) skew(-2deg); }
    100% { transform: translate(0) skew(0deg); }
}
.clue-box {
    border: 1px solid #333;
    padding: 20px;
    background: #050505;
    margin-bottom: 30px;
    width: 80%;
}
.clue-line {
    margin: 10px 0;
    letter-spacing: 2px;
}
.highlight {
    color: #ff0033;
}
.input-wrapper {
    display: flex;
    align-items: center;
    font-size: 1.5rem;
}
input {
    background: transparent;
    border: none;
    border-bottom: 2px solid #0f0;
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.5rem;
    text-align: center;
    width: 200px;
    outline: none;
    margin: 0 10px;
    text-transform: lowercase;
}
#err-msg {
    color: #ff0033;
    margin-top: 20px;
    height: 20px;
    font-size: 1rem;
    text-transform: uppercase;
}
.shake {
    animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both;
}
@keyframes shake {
    10%, 90% { transform: translate3d(-1px, 0, 0); }
    20%, 80% { transform: translate3d(2px, 0, 0); }
    30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
    40%, 60% { transform: translate3d(4px, 0, 0); }
}
</style>
</head>
<body>

<div class="crt"></div>

<div id="stream-left"></div>

<div id="center-console">
    <div class="glitch-text">DATA STREAM CORRUPTED</div>
    
    <div class="clue-box">
        <div class="clue-line">> ALGORITHM: <span class="highlight">POLYBIUS.MATRIX_5x5</span></div>
        <div class="clue-line">> EXCEPTION: <span class="highlight">I=J</span></div>
        <br>
        <div class="clue-line">> INTERCEPTED_SECTORS:</div>
        <div class="clue-line">[34] [12] [31] [24] [51] [24] [34] [33]</div>
        <br>
        <div class="clue-line">> WHAT IS THE DESTINATION?</div>
    </div>

    <div class="input-wrapper">
        [ <input type="text" id="k" maxlength="8" autocomplete="off" spellcheck="false" autofocus> ]
    </div>
    
    <div id="err-msg"></div>
</div>

<div id="stream-right"></div>

<script>
const sl = document.getElementById('stream-left');
const sr = document.getElementById('stream-right');
const k = document.getElementById('k');
const err = document.getElementById('err-msg');
const consoleBox = document.getElementById('center-console');

const chars = '0123456789ABCDEF!@#$%^&*()';
function generateStream() {
    let text = '';
    for(let i=0; i<3000; i++) {
        text += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return text;
}

setInterval(() => {
    sl.innerText = generateStream();
    sr.innerText = generateStream();
}, 150);

const _0x1a = [326, 287, 317, 308, 347, 308, 326, 323];

function _v(s) {
    if(s.length !== 8) return false;
    for(let i=0; i<8; i++) {
        if((s.charCodeAt(i) * 3) - 7 !== _0x1a[i]) return false;
    }
    return true;
}

k.addEventListener('keydown', function(e) {
    if(e.key === 'Enter') {
        const val = this.value.trim().toLowerCase();
        
        if(_v(val)) {
            k.disabled = true;
            err.style.color = '#0f0';
            err.innerText = "DECRYPTION SUCCESS. RECONSTRUCTING PATH...";
            
            let p = 0;
            const glitchInterval = setInterval(() => {
                document.body.style.backgroundColor = p % 2 === 0 ? '#fff' : '#000';
                p++;
                if(p > 10) {
                    clearInterval(glitchInterval);
                    document.body.style.backgroundColor = '#000';
                    window.location.href = "9.html";
                }
            }, 100);
            
        } else {
            consoleBox.classList.remove('shake');
            void consoleBox.offsetWidth; 
            consoleBox.classList.add('shake');
            this.value = '';
            err.innerText = "INVALID KEY. TRACE ACCELERATING.";
        }
    }
});
</script>
</body>
</html>
